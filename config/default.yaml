# Master config. Rule applied throughout the codebase: if changing a value
# shouldn't require re-reading code, it lives here.

camera:
  backend: gstreamer       # gstreamer | v4l2 | replay | synthetic
                           # gstreamer = Jetson hardware JPEG decode (nvv4l2decoder).
                           # Measured on the OV9782: cv2's v4l2 backend tops out at
                           # ~34fps effective (57 delivery + 12ms/frame sw decode);
                           # gstreamer reads 102fps from the same camera. Use v4l2 on
                           # machines whose OpenCV lacks GStreamer (e.g. pip wheels).
  device: /dev/video0
  width: 1280
  height: 800
  fps: 100                 # requested; verify real modes with tools/enumerate_camera.py
  fourcc: MJPG
  replay_path: null        # video file for backend=replay
  replay_realtime: true    # pace replay at recorded fps (false = as fast as possible)
  gst_pipeline: null       # backend=gstreamer: full custom pipeline string override
                           # (must end in an appsink producing BGR)
  # UVC driver controls applied via v4l2-ctl at startup (name: value). These
  # lock exposure/WB to manual: AE/AWB hunting shifts brightness globally,
  # which frame_diff reads as full-frame motion, and long auto exposures cap
  # fps below the mode rate (sensor can't exceed 1/exposure_time). The tuning
  # UI's Camera section overrides these live and persists on Save (to
  # local.yaml). Values proven on the OV9782 during Phase 2 bring-up.
  v4l2_ctrls:
    auto_exposure: 1               # 1 = manual (UVC menu; 3 = aperture-priority auto)
    exposure_time_absolute: 80     # 100µs units -> 8ms; keep under the frame period
    white_balance_automatic: 0
    white_balance_temperature: 4600
    backlight_compensation: 0

calibration:
  intrinsics_file: config/camera_intrinsics.yaml   # tools/calibrate_camera.py writes this
  boresight_file: config/boresight.yaml            # tools/calibrate_boresight.py writes this
  # Fallback when no intrinsics file exists yet: approximate focal length from
  # horizontal FOV. WHY: pixel->angle math must work on day one; a datasheet FOV
  # gives ~5% angle error, which is fine until the ChArUco calibration replaces it.
  fallback_hfov_deg: 70.0
  undistort_points: true    # only applied when a real intrinsics file is loaded
  boresight_yaw_deg: 0.0    # camera-vs-launcher angular offset (Phase 4 tool fills these)
  boresight_pitch_deg: 0.0

detection:
  mode: frame_diff         # frame_diff | aruco | color_mask
  frame_diff:
    threshold: 25          # abs-diff intensity threshold (0-255)
    min_area_px: 40
    max_area_px: 40000
    morph_kernel: 3
    static_gate_dps: 5.0   # suppress detection while commanded turret speed exceeds this (v1 gate)
    ego_motion_comp: false # Phase 4.5
  aruco:
    dictionary: DICT_4X4_50
    marker_size_m: 0.10
  color_mask:
    hsv_low: [5, 120, 120]
    hsv_high: [25, 255, 255]
    min_area_px: 60

ranging:
  mode: fixed              # fixed | known_size | aruco_pose
                           # fixed      = configured constant (bring-up / indoor default)
                           # known_size = apparent bbox size + focal length (needs target_size_m)
                           # aruco_pose = exact solvePnP range off an ArUco marker
                           #              (needs intrinsics + detection.mode: aruco)
  fixed_distance_m: 4.0
  target_size_m: 0.30      # paper-airplane wingspan; known_size only

lead:
  enabled: false           # turn on once ranging gives sane numbers; overlay
                           # then shows the aim point offset from the target
  projectile_speed_mps: 50.0
  drag_model: none         # placeholder by design (D7): measure muzzle velocity first
  gravity_comp: true
  max_lead_deg: 15.0       # bigger computed leads mean bad inputs, not real leads

tracking:
  filter: alpha_beta
  alpha: 0.5               # position correction gain
  beta: 0.2                # velocity correction gain
  max_coast_frames: 8      # predict through misses this long before dropping track
  gate_px: 120             # max px distance for detection<->track association
  min_confidence_output: 0.4  # below this the link sends target_valid=false

# Travel limits, enforced BOTH Jetson-side (never send an illegal command) and
# firmware-side (never trust the wire) — defense in depth, SPEC D2.
turret:
  yaw_min_deg: -170.0
  yaw_max_deg: 170.0
  pitch_min_deg: -10.0
  pitch_max_deg: 60.0

link:
  backend: console         # console | mock | serial
                           # console = human-readable prints (no telemetry)
                           # mock    = simulated turret dynamics + telemetry (full
                           #           closed loop with zero hardware, SPEC D4)
                           # serial  = real ESP32 over pyserial
  port: /dev/ttyUSB0
  baud: 115200
  aim_rate_hz: 50          # wire rate for AIM packets/heartbeats (serial backend)
  telemetry_timeout_s: 0.5 # no AIM for this long -> firmware/mock enters safe-hold
  console_rate_hz: 5       # human-readable print rate (full rate would flood the terminal)

logging:
  run_log_dir: logs
  csv_state_log: true      # per-frame CSV for offline plotting/regression
  log_level: INFO

ui:
  show_window: true        # false for headless runs
  draw_trail: true
  trail_len: 32
  tune_port: 8089          # browser tuning UI port (main.py --tune)

# NOTE: a config/local.yaml next to this file is auto-merged on top of it.
# The tuning UI's Save button writes there, so this file (and its comments)
# never gets rewritten. local.yaml is gitignored.
